[workspace]
name = "med-imagenet"
version = "0.1.1"
description = "A standardized resource for AI-ready oncology imaging"
authors = ["Joshua Siraj <joshuasiraj@gmail.ca>", "Jermiah <jermiahjoseph98@gmail.com>", ]
channels = ["conda-forge"]
platforms = ["linux-64", "osx-64", "osx-arm64", "win-64"]

[tasks]

[dependencies]
python = ">=3.10,<3.14"

[pypi-dependencies]
med-imagenet = { path = ".", editable = true }

[environments]
docs = { features = ["docs"] }
dev = { features = ["dev", "docs", "quality", "test", "build"] }
test = { features = ["test", "quality"] }
publish = ["build", "release"] 
py310 = { features = ["py310", "test"], no-default-feature = true }
py311 = { features = ["py311", "test"], no-default-feature = true }
py312 = { features = ["py312", "test"], no-default-feature = true }
py313 = { features = ["py313", "test"], no-default-feature = true }

################################################################################
# dev
################################################################################

[feature.dev.pypi-dependencies]
med-imagenet = { path = ".", editable = true }
lark = ">=1.3.1, <2"

[feature.dev.dependencies]
ipython = "*"
jupyter = "*"
click = ">=8.1.7,<9"
python-dotenv = ">=1.0.1,<2"

[feature.dev.activation.env]
IMGNET_LOG_LEVEL = "DEBUG"

############################################## PYTHON ###############################################
[feature.py310.dependencies]
python = "3.10.*"

[feature.py311.dependencies]
python = "3.11.*"

[feature.py312.dependencies]
python = "3.12.*"

[feature.py313.dependencies]
python = "3.13.*"

################################################################################
# docs
################################################################################

[feature.docs.dependencies]
mkdocs = "*"
mkdocs-material = ">=9.5.24,<9.6"
mkdocs-macros-plugin = ">=1.0.5,<1.1"
mkdocs-glightbox = ">=0.4.0,<0.5"
mkdocs-autorefs = ">=1.2.0,<2"
mkdocs-git-authors-plugin = ">=0.9.0,<0.10"
mike = ">=2.1.2,<2.2"
mkdocs-git-revision-date-localized-plugin = ">=1.2.9,<2"
mkdocs-include-markdown-plugin = ">=7.0.0,<8"
mkdocs-redirects = ">=1.2.1,<2"

[feature.docs.pypi-dependencies]
mkdocs-awesome-pages-plugin = ">=2.9.1,<3"
mkdocstrings = {version = ">=0.27,<1", extras = ["python"]}
mkdocs-click = ">=0.8,<1"

[feature.docs.tasks]
build.description = "Build the documentation using MkDocs"
build.cmd = "mkdocs build -f mkdocs.yml"
build.inputs = ["docs", "mkdocs.yml"]
build.outputs = ["site"]

serve.description = "Serve the documentation to http://localhost:8000/"
serve.cmd = "mkdocs serve -f mkdocs.yml"

############################################## TEST ################################################
[feature.test.pypi-dependencies]
med-imagenet = { path = ".", editable = true }
pytest = "*"

[feature.test.dependencies]


[feature.test.tasks.test]
cmd = [
  "pytest",
  "--verbose",
  "-s",
]
inputs = ["src", "tests"]
description = "Run pytest"

############################################## QUALITY ###############################################
# Quality includes linting, type checking, and formatting
[feature.quality.dependencies]
ruff = ">=0.9.4"
mypy = ">=1.13.0,<2"
types-tqdm = ">=4.66.0.20240417,<5"
pandas-stubs = ">=2.2.3.241126,<3"
types-pyyaml = ">=6.0.12.20250402,<7"

[feature.quality.pypi-dependencies]
pydoctest = ">=0.2.1, <0.3"

[feature.quality.tasks]
ruff-check.cmd = ["ruff", "check", "src"]
ruff-check.description = "Run ruff check"
ruff-format.cmd = ["ruff", "format", "src"]
ruff-format.description = "Run ruff format, run check first"
type-check.cmd = ["mypy", "src"]
type-check.description = "Run mypy type check."
qc.depends-on = ["ruff-format", "ruff-check", "type-check"]
qc.description = "Quality check: ruff & mypy"

#################################### RELEASE & BUILD ###############################################

[feature.release.pypi-dependencies]
python-semantic-release = "*"

[feature.release.tasks]
semver = 'echo "Next Version is: $(semantic-release version --print)"'
release = "semantic-release version"

[feature.build.pypi-dependencies]
hatch = "*"

[feature.build.tasks]
# Builds the package
hatch-build = { cmd = [
  "hatch",
  "build",
  "--clean",
], inputs = [
  "src",
  "pyproject.toml",
], outputs = [
  "dist/*",
], description = "Build the package" }

# Publishes the package to the main PYPI repository, depends on the build task
publish-pypi = { cmd = [
  "hatch",
  "publish",
  "--yes",
  "--repo",
  "main",
], inputs = [
  "dist/*",
], depends-on = [
  "hatch-build",
], description = "Publish to main PyPI" }

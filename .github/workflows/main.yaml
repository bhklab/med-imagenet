name: CI-CD

# run on any push to any directory and a pull to main or development
on:
  push:
  pull_request:
    branches:
      - main

jobs:
  ################################################################################################
  # Docs: Build and deploy mkdocs documentation
  ################################################################################################
  Docs:
    runs-on: ubuntu-latest

    permissions:
      # Need to give the action permission to write to the repository to deploy the docs
      contents: write

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.8.3
        with:
          pixi-version: v0.42.1
          environments: docs
          cache: true
          locked: false

      - name: Build documentation
        run: pixi run -e docs build

      - name: Build and deploy documentation (only on push to main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pixi run -e docs mike deploy --push dev devel

  ################################################################################################
  Tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        env: ["py310", "py311", "py312"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.8.14
        with:
          environments: ${{ matrix.env }}
          pixi-version: v0.41.3
          cache: true
          locked: false
      - name: Run tests
        run: |
          pixi run -e ${{ matrix.env }} test

  ################################################################################################
  # CD: Continuous Deployment
  ################################################################################################
  Continuous-Deployment:
      concurrency: release

      permissions:
          contents: write
          issues: write
          pull-requests: write

      needs:
          - Unit-Tests
          - Integration-Tests
          - Linting
          - Build-Docs

      if: github.ref_name == 'main' || github.ref_name == 'development'

      runs-on: ubuntu-latest

      outputs:
          released: ${{ steps.release.outputs.released }}
          version: ${{ steps.release.outputs.version }}
          tag: ${{ steps.release.outputs.tag }}

      steps:
          - name: Create GitHub App Token
            uses: actions/create-github-app-token@v1
            id: app-token
            with:
                app-id: ${{ vars.SEMVERPOLICE_ID }}
                private-key: ${{ secrets.SEMVER_APP_KEY }}

          - name: Checkout repository
            uses: actions/checkout@v4
            with:
                fetch-depth: 0

          - name: Set up Python
            uses: actions/setup-python@v5
            with:
                python-version: "3.12"

          - name: Python Semantic Release
            id: release
            uses: python-semantic-release/python-semantic-release@v9
            with:
                root_options: -v
                github_token: ${{ steps.app-token.outputs.token }}
                git_committer_name: gh-actions-semver
                git_committer_email: actions@github.com

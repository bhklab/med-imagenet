name: CI-CD

# run on any push to any directory and a pull to main or development
on:
  push:
  pull_request:
    branches:
      - main

jobs:
  ################################################################################################
  # Docs: Build and deploy mkdocs documentation
  ################################################################################################
  Docs:
    runs-on: ubuntu-latest

    permissions:
      # Need to give the action permission to write to the repository to deploy the docs
      contents: write

    strategy:
      matrix:
        os: [ubuntu-latest]

    steps:
      - name: Check-out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git Credentials
        run: |
          git config user.name github-actions[bot]
          git config user.email github-actions[bot]@users.noreply.github.com

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.66.0
          environments: docs
          cache: true
          locked: false

      - name: Build documentation
        run: pixi run -e docs build

      - name: Build and deploy documentation (only on push to main)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: pixi run -e docs mike deploy --push dev devel

  ################################################################################################
  Tests:
    if: github.event.pull_request.draft == false
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        env: ["py310", "py311", "py312"]
    steps:
      - uses: actions/checkout@v4
      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          environments: ${{ matrix.env }}
          pixi-version: v0.66.0
          cache: true
          locked: false
      - name: Run tests
        run: |
          pixi run -e ${{ matrix.env }} test

  ################################################################################################
  # Generate-PNG: Capture collections overview for the README
  ################################################################################################
  Generate-PNG:
    needs: [Docs, Tests]
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/development')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Download and install termshot
        run: |
          curl -L "https://github.com/homeport/termshot/releases/download/v0.5.0/termshot_0.5.0_linux_amd64.tar.gz" -o termshot.tar.gz
          tar -xzf termshot.tar.gz
          chmod +x termshot
          sudo mv termshot /usr/local/bin/termshot
          rm termshot.tar.gz
          termshot --version

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.66.0
          environments: default
          cache: true
          locked: false
          activate-environment: true

      - name: Warm the CLI
        run: imgnet collections overview

      - name: Generate overview.png using termshot
        env:
          TERM: xterm-256color
          FORCE_COLOR: "1"
          NO_COLOR: ""
        run: |
          mkdir -p docs/figures
          unset NO_COLOR
          termshot --filename docs/figures/overview.png -- imgnet -q collections overview

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/figures/overview.png
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: regenerate overview.png [skip ci]"
            git push
          fi

  ################################################################################################
  # CD: Continuous Deployment
  ################################################################################################
  release-please:
    runs-on: ubuntu-latest
    needs: [Docs, Tests]
    permissions:
      contents: write
      pull-requests: write
    outputs:
      releases_created: ${{ steps.release.outputs.releases_created }}
    steps:
      - id: release
        uses: googleapis/release-please-action@v4
        with:
          release-type: python
          token: ${{ github.token }}

  # --------------------------------------
  # Publish to PyPI when a release is tagged
  # --------------------------------------
  Publish-To-PyPi:
    needs: release-please
    if: ${{ needs.release-please.outputs.releases_created && github.ref == 'refs/heads/main' }}
    runs-on: ubuntu-latest
    env:
      PIXI_ENV: publish

    steps:
      - name: Checkout the tagged release
        uses: actions/checkout@v5

      - name: Install Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          environments: ${{ env.PIXI_ENV }}
          pixi-version: v0.66.0
          cache: true
          locked: false

      - name: Publish to PyPI
        env:
          HATCH_INDEX_USER: __token__
          HATCH_INDEX_AUTH: ${{ secrets.PYPI_API_TOKEN }}
          HATCH_INDEX_REPO: https://upload.pypi.org/legacy/
        run: |
          pixi run -e ${{ env.PIXI_ENV }} publish-pypi
